<div class="auth-page">
  <div class="auth-widget">
    <div class="widget-header">
      <h1>Kayıt Ol</h1>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm" class="auth-form">
      @if (errorMsg(); as e) { <div class="error-banner">{{ e }}</div> }

      <div class="form-field">
        <label>AD SOYAD</label>
        <input type="text" name="name" [(ngModel)]="name" placeholder="Adınız ve Soyadınız" required />
      </div>

      <div class="form-field">
        <label>E-POSTA</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="ornek@sirket.com" required />
      </div>

      <div class="form-field">
        <label>ŞİFRE BELİRLEYİN</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="En az 6 karakter" required />
      </div>

      <button type="submit" class="btn-submit btn-sage" [disabled]="loading() || !f.form.valid">
        {{ loading() ? 'Kayıt yapılıyor…' : 'Hesap Oluştur' }}
      </button>
    </form>

    <div class="divider-row">
      <div class="divider-line"></div>
      <span>VEYA</span>
      <div class="divider-line"></div>
    </div>

    <a routerLink="/login" class="link-switch">Zaten hesabınız var mı? Giriş yapın</a>
  </div>
</div>
